<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
<defs>

  <filter id="mk-ink" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="turbulence" baseFrequency="0.048 0.072" numOctaves="4" seed="17" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="7" xChannelSelector="R" yChannelSelector="G"/>
  </filter>

  <filter id="mk-glow" x="-45%" y="-45%" width="190%" height="190%">
    <feGaussianBlur stdDeviation="10" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <filter id="mk-ink-stem" x="-60%" y="-5%" width="220%" height="110%">
    <feTurbulence type="turbulence" baseFrequency="0.06 0.02" numOctaves="3" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G"/>
  </filter>

  <path id="mk-p1" d="M 4.5,-32 C 7,-122 2.8,-208 0.9,-290 L -0.9,-290 C -2.8,-208 -7,-122 -4.5,-32 Z"/>
  <path id="mk-p2" d="M 5.5,-30 C 8.5,-105 3.3,-178 1.1,-222 L -1.1,-222 C -3.3,-178 -8.5,-105 -5.5,-30 Z"/>
  <path id="mk-p3" d="M 6.5,-27 C 10,-78 4.2,-126 1.5,-156 L -1.5,-156 C -4.2,-126 -10,-78 -6.5,-27 Z"/>
  <path id="mk-p4" d="M 7.5,-22 C 11.5,-52 5.8,-82 2,-100 L -2,-100 C -5.8,-82 -11.5,-52 -7.5,-22 Z"/>
  <path id="mk-p5" d="M 8.5,-16 C 13,-34 7.2,-50 2.4,-62 L -2.4,-62 C -7.2,-50 -13,-34 -8.5,-16 Z"/>

</defs>

