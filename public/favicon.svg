<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#06070a"/>
  <!-- vertical bar -->
  <rect x="30" y="8" width="4" height="48" rx="2" fill="#e8f0ff"/>
  <!-- horizontal bar -->
  <rect x="8" y="30" width="48" height="4" rx="2" fill="#e8f0ff"/>
  <!-- diagonal TL-BR -->
  <rect x="30" y="30" width="4" height="34" rx="2" fill="#e8f0ff" transform="rotate(-45 32 32)"/>
  <!-- diagonal TR-BL -->
  <rect x="30" y="30" width="4" height="34" rx="2" fill="#e8f0ff" transform="rotate(45 32 32)"/>
  <!-- center circle -->
  <circle cx="32" cy="32" r="5" fill="#06070a"/>
  <circle cx="32" cy="32" r="3.5" fill="#a8d8ff"/>
  <!-- arm tips: top -->
  <circle cx="32" cy="9"  r="2.5" fill="#a8d8ff"/>
  <!-- bottom -->
  <circle cx="32" cy="55" r="2.5" fill="#a8d8ff"/>
  <!-- left -->
  <circle cx="9"  cy="32" r="2.5" fill="#a8d8ff"/>
  <!-- right -->
  <circle cx="55" cy="32" r="2.5" fill="#a8d8ff"/>
  <!-- diagonal tips -->
  <circle cx="14" cy="14" r="2.2" fill="#7bbfee"/>
  <circle cx="50" cy="50" r="2.2" fill="#7bbfee"/>
  <circle cx="50" cy="14" r="2.2" fill="#7bbfee"/>
  <circle cx="14" cy="50" r="2.2" fill="#7bbfee"/>
  <!-- inner arm notches: top -->
  <rect x="28.5" y="16" width="3" height="5" rx="1.5" fill="#06070a" transform="rotate(-45 32 32)"/>
  <rect x="28.5" y="16" width="3" height="5" rx="1.5" fill="#06070a" transform="rotate(45 32 32)"/>
  <rect x="28.5" y="16" width="3" height="5" rx="1.5" fill="#06070a"/>
  <rect x="28.5" y="43" width="3" height="5" rx="1.5" fill="#06070a"/>
  <rect x="16" y="30.5" width="5" height="3" rx="1.5" fill="#06070a"/>
  <rect x="43" y="30.5" width="5" height="3" rx="1.5" fill="#06070a"/>
</svg>
