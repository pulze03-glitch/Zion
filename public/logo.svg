    <use href="#p1" transform="rotate(281.25)"/>
    <use href="#p1" transform="rotate(292.5)"/>
    <use href="#p1" transform="rotate(303.75)"/>
    <use href="#p1" transform="rotate(315)"/>
    <use href="#p1" transform="rotate(326.25)"/>
    <use href="#p1" transform="rotate(337.5)"/>
    <use href="#p1" transform="rotate(348.75)"/>
  </g>

  <!-- ── Layer 2: 24 petals, 15° step, +5° phase ── -->
  <g fill="white" opacity="0.77">
    <use href="#p2" transform="rotate(5)"/>
    <use href="#p2" transform="rotate(20)"/>
    <use href="#p2" transform="rotate(35)"/>
    <use href="#p2" transform="rotate(50)"/>
    <use href="#p2" transform="rotate(65)"/>
    <use href="#p2" transform="rotate(80)"/>
    <use href="#p2" transform="rotate(95)"/>
    <use href="#p2" transform="rotate(110)"/>
    <use href="#p2" transform="rotate(125)"/>
