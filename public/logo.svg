<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
<defs>

  <!-- Ink roughness: displaces edges to mimic brushstroke / hand-drawn ink -->
  <filter id="ink" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="turbulence" baseFrequency="0.048 0.072" numOctaves="4" seed="17" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="7" xChannelSelector="R" yChannelSelector="G"/>
  </filter>

  <!-- Soft edge glow layered behind petals -->
  <filter id="glow" x="-45%" y="-45%" width="190%" height="190%">
    <feGaussianBlur stdDeviation="10" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Broad ambient bloom — very soft, wide halo -->
  <filter id="bloom" x="-150%" y="-150%" width="400%" height="400%">
    <feGaussianBlur stdDeviation="42"/>
  </filter>

  <!-- Stem ink texture (lighter displacement) -->
  <filter id="ink-stem" x="-60%" y="-5%" width="220%" height="110%">
    <feTurbulence type="turbulence" baseFrequency="0.06 0.02" numOctaves="3" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G"/>
  </filter>

  <!--
    Petal templates — all point UPWARD (-Y axis from origin).
    They are placed via <use transform="rotate(angle)"> within a
    group translated to the flower center.
    Each layer is progressively shorter and slightly wider at base.
  -->

  <!-- Layer 1: outermost, longest — ri=32, ro=290 -->
  <path id="p1" d="M 4.5,-32
    C 7,-122 2.8,-208 0.9,-290
    L -0.9,-290
    C -2.8,-208 -7,-122 -4.5,-32 Z"/>

  <!-- Layer 2 — ri=30, ro=222 -->
  <path id="p2" d="M 5.5,-30
    C 8.5,-105 3.3,-178 1.1,-222
    L -1.1,-222
    C -3.3,-178 -8.5,-105 -5.5,-30 Z"/>

  <!-- Layer 3 — ri=27, ro=156 -->
  <path id="p3" d="M 6.5,-27
    C 10,-78 4.2,-126 1.5,-156
    L -1.5,-156
    C -4.2,-126 -10,-78 -6.5,-27 Z"/>

  <!-- Layer 4 — ri=22, ro=100 -->
  <path id="p4" d="M 7.5,-22
    C 11.5,-52 5.8,-82 2,-100
    L -2,-100
    C -5.8,-82 -11.5,-52 -7.5,-22 Z"/>

  <!-- Layer 5: innermost — ri=16, ro=62 -->
  <path id="p5" d="M 8.5,-16
    C 13,-34 7.2,-50 2.4,-62
    L -2.4,-62
    C -7.2,-50 -13,-34 -8.5,-16 Z"/>

</defs>

<!-- ════════════════════ BACKGROUND ════════════════════ -->
<rect width="1000" height="1000" fill="#000000"/>

<!-- ════════════════════ AMBIENT BLOOM (soft wide glow behind flower) ════════════════════ -->
<g transform="translate(500,455)" filter="url(#bloom)" opacity="0.30">
  <ellipse rx="220" ry="240" fill="#ffffff"/>
</g>

<!-- ════════════════════ INK SPLASH STREAKS (very faint radial wisps) ════════════════════ -->
<g transform="translate(500,455)" stroke="#ffffff" stroke-linecap="round" fill="none">
  <line x1="0" y1="-303" x2="1"    y2="-362" stroke-width="1.1" opacity="0.07"/>
  <line x1="0" y1="-299" x2="-1"   y2="-355" stroke-width="0.9" opacity="0.06" transform="rotate(15)"/>
  <line x1="0" y1="-306" x2="2"    y2="-366" stroke-width="1"   opacity="0.07" transform="rotate(28)"/>
  <line x1="0" y1="-300" x2="0"    y2="-350" stroke-width="1.2" opacity="0.065" transform="rotate(45)"/>
  <line x1="0" y1="-302" x2="-2"   y2="-358" stroke-width="0.9" opacity="0.06" transform="rotate(60)"/>
  <line x1="0" y1="-298" x2="1"    y2="-362" stroke-width="1"   opacity="0.07" transform="rotate(75)"/>
  <line x1="0" y1="-305" x2="0"    y2="-354" stroke-width="1.1" opacity="0.065" transform="rotate(90)"/>
  <line x1="0" y1="-300" x2="-1"   y2="-360" stroke-width="0.9" opacity="0.06" transform="rotate(108)"/>
  <line x1="0" y1="-304" x2="2"    y2="-352" stroke-width="1.2" opacity="0.07" transform="rotate(122)"/>
  <line x1="0" y1="-299" x2="0"    y2="-358" stroke-width="1"   opacity="0.065" transform="rotate(138)"/>
  <line x1="0" y1="-302" x2="-2"   y2="-365" stroke-width="0.9" opacity="0.06" transform="rotate(152)"/>
  <line x1="0" y1="-301" x2="1"    y2="-355" stroke-width="1.1" opacity="0.07" transform="rotate(165)"/>
  <line x1="0" y1="-305" x2="0"    y2="-362" stroke-width="1"   opacity="0.065" transform="rotate(180)"/>
  <line x1="0" y1="-300" x2="-1"   y2="-350" stroke-width="0.9" opacity="0.06" transform="rotate(195)"/>
  <line x1="0" y1="-303" x2="2"    y2="-358" stroke-width="1.2" opacity="0.07" transform="rotate(210)"/>
  <line x1="0" y1="-298" x2="0"    y2="-355" stroke-width="1"   opacity="0.065" transform="rotate(225)"/>
  <line x1="0" y1="-306" x2="-1"   y2="-364" stroke-width="0.9" opacity="0.06" transform="rotate(242)"/>
  <line x1="0" y1="-301" x2="1"    y2="-352" stroke-width="1.1" opacity="0.07" transform="rotate(258)"/>
  <line x1="0" y1="-304" x2="0"    y2="-360" stroke-width="1"   opacity="0.065" transform="rotate(270)"/>
  <line x1="0" y1="-300" x2="-2"   y2="-356" stroke-width="0.9" opacity="0.06" transform="rotate(285)"/>
  <line x1="0" y1="-302" x2="2"    y2="-362" stroke-width="1.2" opacity="0.07" transform="rotate(300)"/>
  <line x1="0" y1="-299" x2="0"    y2="-354" stroke-width="1"   opacity="0.065" transform="rotate(315)"/>
  <line x1="0" y1="-305" x2="-1"   y2="-358" stroke-width="0.9" opacity="0.06" transform="rotate(330)"/>
  <line x1="0" y1="-301" x2="1"    y2="-365" stroke-width="1.1" opacity="0.07" transform="rotate(348)"/>
</g>

<!-- Tiny ink droplets at outer edge -->
<g fill="#ffffff">
  <circle cx="500"  cy="148"  r="1.6" opacity="0.09"/>
  <circle cx="519"  cy="160"  r="0.9" opacity="0.07"/>
  <circle cx="481"  cy="155"  r="1.1" opacity="0.07"/>
  <circle cx="760"  cy="432"  r="1.5" opacity="0.08"/>
  <circle cx="748"  cy="452"  r="0.9" opacity="0.06"/>
  <circle cx="240"  cy="422"  r="1.5" opacity="0.08"/>
  <circle cx="252"  cy="444"  r="0.9" opacity="0.06"/>
  <circle cx="500"  cy="768"  r="1.4" opacity="0.07"/>
  <circle cx="510"  cy="756"  r="0.8" opacity="0.05"/>
  <circle cx="778"  cy="348"  r="1.1" opacity="0.06"/>
  <circle cx="224"  cy="362"  r="1.1" opacity="0.06"/>
  <circle cx="628"  cy="175"  r="0.9" opacity="0.06"/>
