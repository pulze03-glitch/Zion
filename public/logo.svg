<!-- ════════════════════ STEM ════════════════════ -->
<line
  x1="500" y1="478"
  x2="500" y2="762"
  stroke="white"
  stroke-width="2.4"
  stroke-linecap="round"
  opacity="0.52"
  filter="url(#ink-stem)"
/>

</svg>
