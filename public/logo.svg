    <use href="#p3" transform="rotate(263)"/>
    <use href="#p3" transform="rotate(283)"/>
    <use href="#p3" transform="rotate(303)"/>
    <use href="#p3" transform="rotate(323)"/>
    <use href="#p3" transform="rotate(343)"/>
  </g>

  <!-- ── Layer 4: 12 petals, 30° step, +7.5° phase ── -->
  <g fill="white" opacity="0.91">
    <use href="#p4" transform="rotate(7.5)"/>
    <use href="#p4" transform="rotate(37.5)"/>
