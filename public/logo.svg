<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
<defs>

  <filter id="f-ink" x="-25%" y="-25%" width="150%" height="150%">
    <feTurbulence type="turbulence" baseFrequency="0.04 0.06" numOctaves="3" seed="31" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="5" xChannelSelector="R" yChannelSelector="G"/>
  </filter>

  <filter id="f-glow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="14" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <filter id="f-bloom" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur stdDeviation="48"/>
  </filter>

  <filter id="f-stem" x="-80%" y="-3%" width="260%" height="106%">
    <feTurbulence type="turbulence" baseFrequency="0.05 0.018" numOctaves="3" seed="5" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="4" xChannelSelector="R" yChannelSelector="G"/>
  </filter>

  <g id="ctr">
    <line x1="0" y1="0" x2="0" y2="-272"
      stroke="#B098DC" stroke-width="3.2" stroke-linecap="round" opacity="0.78"
      filter="url(#f-stem)"/>
    <ellipse cx="-17" cy="-80"  rx="3"   ry="15" transform="rotate(-28,-17,-80)"  fill="#9878C0" opacity="0.50"/>
    <ellipse cx=" 17" cy="-80"  rx="3"   ry="15" transform="rotate( 28, 17,-80)"  fill="#9878C0" opacity="0.50"/>
    <ellipse cx="-15" cy="-158" rx="2.5" ry="12" transform="rotate(-25,-15,-158)" fill="#9878C0" opacity="0.45"/>
    <ellipse cx=" 15" cy="-158" rx="2.5" ry="12" transform="rotate( 25, 15,-158)" fill="#9878C0" opacity="0.45"/>
    <ellipse cx="-13" cy="-228" rx="2"   ry="10" transform="rotate(-22,-13,-228)" fill="#9878C0" opacity="0.40"/>
    <ellipse cx=" 13" cy="-228" rx="2"   ry="10" transform="rotate( 22, 13,-228)" fill="#9878C0" opacity="0.40"/>
    <g fill="#E8CCFF">
      <ellipse cx="-25" cy="-280" rx="14"   ry="7"/>
      <ellipse cx=" 25" cy="-280" rx="14"   ry="7"/>
      <ellipse cx="-23" cy="-305" rx="13.5" ry="6.7"/>
      <ellipse cx=" 23" cy="-305" rx="13.5" ry="6.7"/>
      <ellipse cx="-22" cy="-330" rx="13"   ry="6.5"/>
      <ellipse cx=" 22" cy="-330" rx="13"   ry="6.5"/>
      <ellipse cx="-20" cy="-355" rx="12"   ry="6"/>
      <ellipse cx=" 20" cy="-355" rx="12"   ry="6"/>
      <ellipse cx="-19" cy="-379" rx="11.5" ry="5.7"/>
      <ellipse cx=" 19" cy="-379" rx="11.5" ry="5.7"/>
      <ellipse cx="-17" cy="-402" rx="11"   ry="5.5"/>
      <ellipse cx=" 17" cy="-402" rx="11"   ry="5.5"/>
      <ellipse cx="-16" cy="-424" rx="10.5" ry="5.2"/>
      <ellipse cx=" 16" cy="-424" rx="10.5" ry="5.2"/>
      <ellipse cx="-14" cy="-445" rx="10"   ry="5"/>
      <ellipse cx=" 14" cy="-445" rx="10"   ry="5"/>
      <ellipse cx="-13" cy="-465" rx="9.5"  ry="4.7"/>
      <ellipse cx=" 13" cy="-465" rx="9.5"  ry="4.7"/>
      <ellipse cx="-11" cy="-484" rx="9"    ry="4.5"/>
      <ellipse cx=" 11" cy="-484" rx="9"    ry="4.5"/>
      <ellipse cx="-10" cy="-502" rx="8"    ry="4"/>
      <ellipse cx=" 10" cy="-502" rx="8"    ry="4"/>
      <ellipse cx="- 9" cy="-518" rx="7"    ry="3.5"/>
      <ellipse cx="  9" cy="-518" rx="7"    ry="3.5"/>
      <ellipse cx="0"   cy="-530" rx="4"    ry="3.2"/>
    </g>
  </g>

  <g id="side">
    <line x1="0" y1="0" x2="0" y2="-242"
      stroke="#B098DC" stroke-width="2.8" stroke-linecap="round" opacity="0.72"
      filter="url(#f-stem)"/>
    <ellipse cx="-16" cy="-72"  rx="2.8" ry="13" transform="rotate(-26,-16,-72)"  fill="#9878C0" opacity="0.48"/>
    <ellipse cx=" 16" cy="-72"  rx="2.8" ry="13" transform="rotate( 26, 16,-72)"  fill="#9878C0" opacity="0.48"/>
    <ellipse cx="-14" cy="-150" rx="2.3" ry="11" transform="rotate(-23,-14,-150)" fill="#9878C0" opacity="0.42"/>
    <ellipse cx=" 14" cy="-150" rx="2.3" ry="11" transform="rotate( 23, 14,-150)" fill="#9878C0" opacity="0.42"/>
    <g fill="#E8CCFF">
      <ellipse cx="-23" cy="-250" rx="13"   ry="6.5"/>
      <ellipse cx=" 23" cy="-250" rx="13"   ry="6.5"/>
      <ellipse cx="-21" cy="-278" rx="12.5" ry="6.2"/>
      <ellipse cx=" 21" cy="-278" rx="12.5" ry="6.2"/>
      <ellipse cx="-20" cy="-305" rx="12"   ry="6"/>
      <ellipse cx=" 20" cy="-305" rx="12"   ry="6"/>
      <ellipse cx="-18" cy="-331" rx="11"   ry="5.5"/>
      <ellipse cx=" 18" cy="-331" rx="11"   ry="5.5"/>
      <ellipse cx="-17" cy="-356" rx="10.5" ry="5.2"/>
      <ellipse cx=" 17" cy="-356" rx="10.5" ry="5.2"/>
      <ellipse cx="-15" cy="-380" rx="10"   ry="5"/>
      <ellipse cx=" 15" cy="-380" rx="10"   ry="5"/>
      <ellipse cx="-14" cy="-403" rx="9"    ry="4.5"/>
      <ellipse cx=" 14" cy="-403" rx="9"    ry="4.5"/>
      <ellipse cx="-12" cy="-425" rx="8.5"  ry="4.2"/>
      <ellipse cx=" 12" cy="-425" rx="8.5"  ry="4.2"/>
      <ellipse cx="-11" cy="-445" rx="8"    ry="4"/>
      <ellipse cx=" 11" cy="-445" rx="8"    ry="4"/>
      <ellipse cx="- 9" cy="-464" rx="7"    ry="3.5"/>
      <ellipse cx="  9" cy="-464" rx="7"    ry="3.5"/>
      <ellipse cx="0"   cy="-476" rx="3.5"  ry="2.8"/>
    </g>
  </g>

</defs>

<!-- Background -->
<rect width="1000" height="1000" fill="#000000"/>

<!-- Ambient bloom -->
<g transform="translate(500,820)" filter="url(#f-bloom)" opacity="0.48">
  <ellipse rx="80" ry="200" cy="-390" fill="#B080FF"/>
</g>

<!-- Glow halo -->
<g filter="url(#f-glow)" opacity="0.52">
  <g transform="translate(500,820) rotate(-20)"><use href="#side"/></g>
  <g transform="translate(500,820)"><use href="#ctr"/></g>
  <g transform="translate(500,820) rotate(20)"><use href="#side"/></g>
</g>

<!-- Main spikes -->
<g filter="url(#f-ink)">
  <g transform="translate(500,820) rotate(-20)"><use href="#side"/></g>
  <g transform="translate(500,820)"><use href="#ctr"/></g>
  <g transform="translate(500,820) rotate(20)"><use href="#side"/></g>
</g>

</svg>
