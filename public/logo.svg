  <circle cx="680"  cy="720"  r="0.8" opacity="0.05"/>
  <circle cx="322"  cy="715"  r="0.8" opacity="0.05"/>
</g>

<!-- ════════════════════ SOFT GLOW HALO (blurred ghost petals behind main flower) ════════════════════ -->
<g transform="translate(500,455)" filter="url(#glow)" opacity="0.36">
  <g fill="white">
    <use href="#p1" transform="rotate(0)"/>
    <use href="#p1" transform="rotate(22.5)"/>
    <use href="#p1" transform="rotate(45)"/>
    <use href="#p1" transform="rotate(67.5)"/>
    <use href="#p1" transform="rotate(90)"/>
    <use href="#p1" transform="rotate(112.5)"/>
    <use href="#p1" transform="rotate(135)"/>
    <use href="#p1" transform="rotate(157.5)"/>
    <use href="#p1" transform="rotate(180)"/>
    <use href="#p1" transform="rotate(202.5)"/>
    <use href="#p1" transform="rotate(225)"/>
    <use href="#p1" transform="rotate(247.5)"/>
    <use href="#p1" transform="rotate(270)"/>
    <use href="#p1" transform="rotate(292.5)"/>
    <use href="#p1" transform="rotate(315)"/>
    <use href="#p1" transform="rotate(337.5)"/>
  </g>
</g>

<!-- ════════════════════ MAIN FLOWER (ink-textured) ════════════════════ -->
<g transform="translate(500,455)" filter="url(#ink)">

  <!-- ── Layer 1: 32 outermost petals, 11.25° step ── -->
  <g fill="white" opacity="0.70">
    <use href="#p1" transform="rotate(0)"/>
    <use href="#p1" transform="rotate(11.25)"/>
    <use href="#p1" transform="rotate(22.5)"/>
    <use href="#p1" transform="rotate(33.75)"/>
    <use href="#p1" transform="rotate(45)"/>
    <use href="#p1" transform="rotate(56.25)"/>
    <use href="#p1" transform="rotate(67.5)"/>
    <use href="#p1" transform="rotate(78.75)"/>
    <use href="#p1" transform="rotate(90)"/>
    <use href="#p1" transform="rotate(101.25)"/>
    <use href="#p1" transform="rotate(112.5)"/>
    <use href="#p1" transform="rotate(123.75)"/>
    <use href="#p1" transform="rotate(135)"/>
    <use href="#p1" transform="rotate(146.25)"/>
    <use href="#p1" transform="rotate(157.5)"/>
    <use href="#p1" transform="rotate(168.75)"/>
    <use href="#p1" transform="rotate(180)"/>
    <use href="#p1" transform="rotate(191.25)"/>
    <use href="#p1" transform="rotate(202.5)"/>
    <use href="#p1" transform="rotate(213.75)"/>
    <use href="#p1" transform="rotate(225)"/>
